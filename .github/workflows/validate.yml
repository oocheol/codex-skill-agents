name: Validate Codex Skills

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run validator self-tests
        run: python scripts/validate_skills.py --self-test

      - name: Run skill validation
        run: python scripts/validate_skills.py
